<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rhythia Replay Viewer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <input id="fileInput" type="file" accept=".rhr" hidden />

  <div class="layout">
    <main class="player-stage">
      <canvas id="view"></canvas>
    </main>
  </div>

  <!-- HUD data store: hidden DOM nodes whose textContent / style is read by
       the canvas renderer each frame. Keeps stat updates as plain DOM
       writes without needing a parallel data layer. -->
  <div id="hud-data" hidden>
    <span id="songName">Rhythia Replay Viewer</span>
    <span id="timeLabel">00:00 / 00:00</span>
    <span id="comboVal">0x</span>
    <span id="pauseVal">0</span>
    <span id="rankVal">D</span>
    <span id="accVal">0%</span>
    <span id="scoreVal">0</span>
    <span id="pointsVal">0</span>
    <span id="missVal">0</span>
    <span id="noteCountVal">0/0</span>
    <span id="modsRow"></span>
    <span id="progressFill" style="width:0%"></span>
    <span id="healthFill" style="width:100%;background:#4ade80"></span>
  </div>

  <!-- Bottom transport dock: file + speed + interactive progress bar -->
  <div class="transport-dock" id="transportFloating">
    <button class="btn-icon" id="openFile" title="Open replay">&#128194;</button>
    <button id="playPause" disabled title="Play / pause">&#9654;</button>
    <select id="speed" class="speed-select" disabled title="Playback speed">
      <option value="0.25">0.25x</option>
      <option value="0.5">0.5x</option>
      <option value="0.75">0.75x</option>
      <option value="1" selected>1x</option>
      <option value="1.5">1.5x</option>
      <option value="2">2x</option>
    </select>
    <input id="seek" class="ipb-slider" type="range" min="0" max="1" step="0.0001" value="0" disabled />
  </div>

  <!-- Drop zone overlay (initial state) -->
  <section id="dropZone" class="dropzone" tabindex="0" role="button" aria-label="Drop replay file here">
    <div class="dropzone-inner">
      <div class="drop-icon">&#9654;</div>
      <p class="drop-title">Drop .rhr replay file</p>
      <p class="drop-subtitle">or click to browse</p>
    </div>
  </section>

  <script src="app.js"></script>
</body>
</html>
